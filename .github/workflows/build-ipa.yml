name: Build SkateQuest IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Expo Prebuild iOS
        run: npx expo prebuild --platform ios --non-interactive --clean
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN }}
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build IPA
        run: |
          cd ios
          xcodebuild \
            -workspace SkateQuest.xcworkspace \
            -scheme SkateQuest \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/SkateQuest.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/SkateQuest.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist exportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SkateQuest-IPA
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30
