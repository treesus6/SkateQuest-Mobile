name: EAS Build (Manual)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform
        required: true
        default: android
        type: choice
        options: [android, ios]
      profile:
        description: Build profile
        required: true
        default: production
        type: choice
        options: [preview, production]

permissions:
  contents: read

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.platform }} / ${{ github.event.inputs.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 20
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: EAS Build
        run: eas build --platform ${{ github.event.inputs.platform }} --profile ${{ github.event.inputs.profile }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}

      - name: Write Google Service Account key
        if: ${{ github.event.inputs.profile == 'production' && github.event.inputs.platform == 'android' }}
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > ./google-service-account.json

      - name: EAS Submit to Play Store (production only)
        if: ${{ github.event.inputs.profile == 'production' && github.event.inputs.platform == 'android' }}
        run: eas submit --platform android --profile production --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
