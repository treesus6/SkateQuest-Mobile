name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript typecheck
        run: npx tsc --noEmit 2>&1 | grep -v node_modules | grep -v __tests__ | grep -v ".d.ts" | tee /tmp/ts-errors.txt; if grep -q "error TS" /tmp/ts-errors.txt; then echo "TypeScript errors found!"; exit 1; fi

      - name: ESLint
        run: npx eslint . --max-warnings=0
