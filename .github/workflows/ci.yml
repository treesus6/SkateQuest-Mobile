name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Mapbox npm registry
        run: |
          echo "//api.mapbox.com/downloads/v2/:_authToken=${MAPBOX_DOWNLOADS_TOKEN}" >> ~/.npmrc
          echo "@rnmapbox:registry=https://api.mapbox.com/downloads/v2/" >> ~/.npmrc
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript typecheck
        run: npx tsc --noEmit 2>&1 | grep -v node_modules | grep -v __tests__ | grep -v ".d.ts" | tee /tmp/ts-errors.txt; if grep -q "error TS" /tmp/ts-errors.txt; then echo "TypeScript errors found!"; exit 1; fi

      - name: ESLint
        run: npx eslint . --max-warnings=0
