<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Dimension — SkateQuest Stats</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; padding: 24px; }
  .header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
  .logo { font-size: 24px; font-weight: 900; color: #d2673d; letter-spacing: -1px; }
  .subtitle { color: #666; font-size: 14px; margin-top: 2px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .card { background: #1a1a1a; border-radius: 12px; padding: 20px; border: 1px solid #222; }
  .card-label { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .card-value { font-size: 36px; font-weight: 900; color: #d2673d; }
  .card-sub { font-size: 12px; color: #555; margin-top: 4px; }
  .section { background: #1a1a1a; border-radius: 12px; padding: 20px; border: 1px solid #222; margin-bottom: 16px; }
  .section h2 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .bar-label { width: 90px; font-size: 13px; color: #aaa; flex-shrink: 0; }
  .bar-track { flex: 1; background: #222; border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; background: #d2673d; border-radius: 4px; transition: width 0.6s ease; }
  .bar-count { width: 40px; text-align: right; font-size: 13px; color: #fff; }
  .loading { color: #555; font-size: 14px; text-align: center; padding: 40px; }
  .updated { color: #444; font-size: 12px; text-align: right; margin-top: 16px; }
  .pill { display: inline-block; background: #d2673d22; color: #d2673d; border-radius: 99px; padding: 2px 10px; font-size: 11px; font-weight: 700; margin-left: 8px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">Portal Dimension <span class="pill">on SkateQuest</span></div>
    <div class="subtitle">Live tap stats — updated every time you load this page</div>
  </div>
</div>

<div id="stats-grid" class="grid">
  <div class="loading">Loading stats...</div>
</div>

<div id="breakdown" class="section" style="display:none">
  <h2>Taps by action</h2>
  <div id="action-bars"></div>
</div>

<div class="updated" id="updated-at"></div>

<script>
const SUPABASE_URL = "https://hreeuqdgrwvnxquxohod.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhyZWV1cWRncnd2bnhxdXhvaG9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjc1NTgxMDgsImV4cCI6MjA0MzEzNDEwOH0.nIXqHDJeXDEeRRQ3LmBFamrDMcg4LMVNfmFuMzMj3GA";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadStats() {
  try {
    // Get Portal Dimension entry
    const { data: entry } = await db
      .from("map_sponsors")
      .select("id, name, city, state")
      .eq("name", "Portal Dimension")
      .single();

    if (!entry) {
      document.getElementById("stats-grid").innerHTML =
        "<div class=loading>Portal Dimension not found in the scene map yet.</div>";
      return;
    }

    // Get stats via RPC
    const { data: stats } = await db.rpc("get_sponsor_stats", { p_sponsor_id: entry.id });
    const s = stats?.[0] ?? {};

    // Render stat cards
    document.getElementById("stats-grid").innerHTML = `
      <div class="card">
        <div class="card-label">Total Taps</div>
        <div class="card-value">${(s.total_clicks ?? 0).toLocaleString()}</div>
        <div class="card-sub">all time</div>
      </div>
      <div class="card">
        <div class="card-label">Today</div>
        <div class="card-value">${(s.clicks_today ?? 0).toLocaleString()}</div>
        <div class="card-sub">in the last 24h</div>
      </div>
      <div class="card">
        <div class="card-label">This Week</div>
        <div class="card-value">${(s.clicks_this_week ?? 0).toLocaleString()}</div>
        <div class="card-sub">last 7 days</div>
      </div>
      <div class="card">
        <div class="card-label">This Month</div>
        <div class="card-value">${(s.clicks_this_month ?? 0).toLocaleString()}</div>
        <div class="card-sub">calendar month</div>
      </div>
      <div class="card">
        <div class="card-label">Unique Skaters</div>
        <div class="card-value">${(s.unique_users ?? 0).toLocaleString()}</div>
        <div class="card-sub">distinct users</div>
      </div>
    `;

    // Get action breakdown
    const { data: actions } = await db
      .from("sponsor_clicks")
      .select("action")
      .eq("sponsor_id", entry.id);

    if (actions?.length > 0) {
      const counts = {};
      actions.forEach(r => { counts[r.action] = (counts[r.action] || 0) + 1; });
      const max = Math.max(...Object.values(counts));
      const labels = {
        marker_tap: "Map Pin",
        website_tap: "Website",
        instagram_tap: "Instagram",
        logo_tap: "Logo"
      };
      const bars = Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .map(([action, count]) => `
          <div class="bar-row">
            <div class="bar-label">${labels[action] || action}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${(count/max*100).toFixed(1)}%"></div>
            </div>
            <div class="bar-count">${count}</div>
          </div>
        `).join("");
      document.getElementById("action-bars").innerHTML = bars;
      document.getElementById("breakdown").style.display = "block";
    }

    document.getElementById("updated-at").textContent =
      "Last updated: " + new Date().toLocaleString();

  } catch (err) {
    document.getElementById("stats-grid").innerHTML =
      `<div class="loading">Error loading stats: ${err.message}</div>`;
  }
}

loadStats();
</script>
</body>
</html>
